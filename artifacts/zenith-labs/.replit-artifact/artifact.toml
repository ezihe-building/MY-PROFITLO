kind = "web"
previewPath = "/"
title = "ZENITH LABS — Portfolio"
version = "1.0.0"
id = "artifacts/zenith-labs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24914

[services.development]
run = "pnpm --filter @workspace/zenith-labs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zenith-labs", "run", "build" ]
publicDir = "artifacts/zenith-labs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24914"
BASE_PATH = "/"
